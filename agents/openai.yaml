openai_spec_version: 1.0
name: Requirement Solution Planner
description: 先判断输入是单需求还是多需求，再输出结构化执行方案。适用于需求拆解、实施规划、技术方案、路线图、里程碑拆分、任务清单、优先级排序、排期建议、依赖分析、交付物定义、验收标准和复核机制设计；多需求场景会先生成总方案，再继续拆成独立事项方案。适合“先别写代码先分析”“先给方案再执行”“先帮我梳理一下”“拆成可执行步骤”“给我实施方案”“排个优先级”“拆成里程碑”“按总方案继续拆”等请求。默认先暴露假设、权衡多种解释、避免过度设计、保持简单方案优先，并把模糊请求改写为可验证成功标准。
display_name: Requirement Solution Planner
category: productivity
icon: clipboard-check
